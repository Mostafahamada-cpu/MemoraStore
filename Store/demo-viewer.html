<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo Viewer - Memora</title>
  <link rel="icon" type="image/jpeg" href="images/logo.jpeg">
  <link rel="stylesheet" href="assets/css/premium.css">
  <style>
    .demo-container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      z-index: 1000;
    }

    .demo-toolbar {
      background: var(--bg-white);
      border-bottom: 1px solid var(--border-light);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
      box-shadow: var(--shadow-sm);
    }

    .demo-toolbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
      flex: 1;
      min-width: 0;
    }

    .demo-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      color: var(--primary-dark);
      white-space: nowrap;
    }

    .demo-logo-icon {
      font-size: 20px;
    }

    .demo-theme-name {
      font-weight: 600;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    .demo-toolbar-views {
      display: flex;
      gap: 8px;
      background: var(--bg-gray);
      padding: 4px;
      border-radius: 8px;
    }

    .demo-view-btn {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-sm);
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-secondary);
    }

    .demo-view-btn:hover {
      background: var(--bg-white);
    }

    .demo-view-btn.active {
      background: white;
      color: var(--accent-gold);
      border-color: var(--accent-gold);
    }

    .demo-toolbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .demo-frame {
      flex: 1;
      border: none;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .demo-viewport {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background: var(--bg-gray);
      overflow-y: auto;
      overflow-x: hidden;
    }

    .demo-viewport-content {
      width: 100%;
      height: 100%;
      background: white;
    }

    /* Responsive Breakpoints */
    .viewport-desktop .demo-viewport { width: 100%; }
    .viewport-desktop .demo-viewport-content { max-width: 100%; }

    .viewport-tablet .demo-viewport { width: 100%; max-width: 768px; }
    .viewport-mobile .demo-viewport { width: 100%; max-width: 375px; }

    @media (max-width: 640px) {
      .demo-toolbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .demo-toolbar-left,
      .demo-toolbar-right {
        width: 100%;
        justify-content: space-between;
      }

      .demo-theme-name {
        max-width: none;
      }

      .demo-toolbar-views {
        width: 100%;
        order: 3;
      }
    }
  </style>
</head>
<body>
  <div class="demo-container">
    <div class="demo-toolbar">
      <div class="demo-toolbar-left">
        <div class="demo-logo" style="display: flex; align-items: center; gap: 12px;">
          <img src="images/logo.jpeg" alt="Memora Logo" style="height: 36px; width: auto; object-fit: contain; border-radius: 8px;">
          <span>Memora</span>
        </div>
        <span class="divider" style="height: 20px; width: 1px; background: var(--border-color); margin: 0;"></span>
        <span class="demo-theme-name" id="theme-name">Loading...</span>
      </div>

      <div class="demo-toolbar-views">
        <button class="demo-view-btn active" data-view="desktop" onclick="setViewport('desktop')">
          <span style="font-size: 14px;">🖥️</span> Desktop
        </button>
        <button class="demo-view-btn" data-view="tablet" onclick="setViewport('tablet')">
          <span style="font-size: 14px;">📱</span> Tablet
        </button>
        <button class="demo-view-btn" data-view="mobile" onclick="setViewport('mobile')">
          <span style="font-size: 14px;">📱</span> Mobile
        </button>
      </div>

      <div class="demo-toolbar-right">
        <button class="btn btn-primary btn-sm" onclick="buyNow()">Buy Now</button>
        <button class="btn btn-outline btn-sm" onclick="goBack()">← Back</button>
      </div>
    </div>

    <div class="demo-viewport viewport-desktop" id="viewport">
      <div class="demo-viewport-content" id="demo-frame"></div>
    </div>
  </div>

  <script>
    // Get demo URL from query parameter
    const urlParams = new URLSearchParams(window.location.search);
    const demoUrl = urlParams.get('url') || window.location.pathname.replace('demo-viewer.html', '');
    const themeName = urlParams.get('theme') || 'Template Demo';

    document.getElementById('theme-name').textContent = themeName;

    // Load demo iframe
    const viewportElement = document.getElementById('viewport');
    const frameElement = document.getElementById('demo-frame');

    // Create iframe to load the demo
    const iframe = document.createElement('iframe');
    iframe.src = demoUrl;
    iframe.className = 'demo-frame';
    iframe.setAttribute('sandbox', 'allow-same-origin allow-scripts allow-popups allow-forms');
    frameElement.appendChild(iframe);

    function setViewport(view) {
      const viewport = document.getElementById('viewport');
      
      // Remove all viewport classes
      viewport.classList.remove('viewport-desktop', 'viewport-tablet', 'viewport-mobile');
      
      // Add new viewport class
      viewport.classList.add(`viewport-${view}`);

      // Update active button
      document.querySelectorAll('.demo-view-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      document.querySelector(`[data-view="${view}"]`).classList.add('active');
    }

    function buyNow() {
      // Get the product ID from the theme name
      const productId = themeName.toLowerCase().replace(/\s+/g, '-');
      window.location.href = `order-form.html?product=${productId}`;
    }

    function goBack() {
      window.history.back();
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') goBack();
    });
  </script>
</body>
</html>
