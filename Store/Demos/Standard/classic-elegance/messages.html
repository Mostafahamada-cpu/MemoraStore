<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guest Messages - Wedding Invitation</title>
    <meta name="description" content="Messages and well wishes from our guests." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Great+Vibes&family=Montserrat:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: var(--color-cream);
            background-image: radial-gradient(ellipse at 50% 0%, rgba(232, 213, 163, 0.3) 0%, transparent 60%);
        }
        
        .messages-header {
            text-align: center;
            padding: 80px 20px 40px;
        }

        .messages-title {
            font-family: var(--font-script);
            font-size: 4rem;
            color: var(--color-charcoal);
            margin-bottom: 10px;
            animation: fadeInDown 0.8s ease forwards;
        }

        .messages-subtitle {
            font-family: var(--font-sans);
            font-size: 0.9rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--color-taupe);
            animation: fadeIn 1s ease 0.3s forwards;
            opacity: 0;
        }

        .messages-grid {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding-bottom: 80px;
        }

        .message-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 200, 87, 0.3);
            border-radius: 16px;
            padding: 30px 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            transition: var(--transition-smooth);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease forwards;
            position: relative;
            overflow: hidden;
        }

        .message-card::before {
            content: '❝';
            position: absolute;
            top: -10px;
            right: 15px;
            font-size: 6rem;
            color: var(--color-gold);
            opacity: 0.1;
            font-family: var(--font-serif);
            line-height: 1;
        }

        .message-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
            border-color: rgba(255, 200, 87, 0.6);
        }

        .message-text {
            font-family: var(--font-serif);
            font-size: 1.15rem;
            font-style: italic;
            color: var(--color-charcoal-light);
            line-height: 1.6;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .message-author {
            font-family: var(--font-sans);
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--color-gold-dark);
            text-align: right;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }

        .back-link {
            display: inline-block;
            margin-top: 40px;
            font-family: var(--font-sans);
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--color-taupe);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: var(--transition-smooth);
        }

        .back-link:hover {
            color: var(--color-charcoal);
            border-bottom-color: var(--color-charcoal);
        }

        .no-messages {
            text-align: center;
            grid-column: 1 / -1;
            padding: 60px 20px;
            font-family: var(--font-serif);
            font-size: 1.2rem;
            color: var(--color-taupe);
            font-style: italic;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <header class="messages-header">
        <h1 class="messages-title">Love Notes</h1>
        <div class="messages-subtitle">Wishes from our beloved guests</div>
        <div class="messages-stats" id="messages-stats" style="margin-top: 15px; font-family: var(--font-sans); font-size: 0.95rem; font-weight: 600; color: var(--color-gold-dark); display: none;"></div>
        <a href="index.html" class="back-link">← Back to Invitation</a>
    </header>

    <div id="messages-password-area" style="max-width: 400px; margin: 40px auto; text-align: center; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); padding: 40px 30px; border-radius: 16px; border: 1px solid rgba(255, 200, 87, 0.3); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);">
        <div style="font-size: 2.5rem; margin-bottom: 15px;">🔐</div>
        <p style="font-family: var(--font-sans); font-size: 0.95rem; color: var(--color-charcoal-light); margin-bottom: 20px;">Enter password to view guest messages</p>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <input id="guest-password-input" type="password" placeholder="Password" style="padding: 12px 16px; border-radius: 8px; border: 1px solid rgba(201, 169, 110, 0.3); font-family: var(--font-sans); outline: none; width: 60%;" />
            <button id="guest-password-submit" style="padding: 12px 20px; background: linear-gradient(135deg, var(--color-gold), var(--color-gold-dark)); color: white; border: none; border-radius: 8px; font-family: var(--font-sans); font-weight: 600; cursor: pointer; transition: all 0.3s ease;">Unlock</button>
        </div>
        <div id="guest-password-feedback" style="color: #D46B78; font-family: var(--font-sans); font-size: 0.85rem; margin-top: 15px; min-height: 20px;"></div>
    </div>

    <main class="messages-grid" id="messages-container" style="display: none;">
        <!-- Messages will be populated here by JavaScript -->
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
        import {
          getFirestore,
          collection,
          getDocs
        } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDs1HJCTv-wnF238WvuQN45V2zZCZ9FNuA",
            authDomain: "ro-wedding-inv1.firebaseapp.com",
            projectId: "ro-wedding-inv1",
            storageBucket: "ro-wedding-inv1.firebasestorage.app",
            messagingSenderId: "181082894081",
            appId: "1:181082894081:web:a18ba3e75a101801767500",
            measurementId: "G-J4795J0HRW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const pwArea = document.getElementById('messages-password-area');
        const pwInput = document.getElementById('guest-password-input');
        const pwSubmit = document.getElementById('guest-password-submit');
        const pwFeedback = document.getElementById('guest-password-feedback');
        const container = document.getElementById('messages-container');
        const stats = document.getElementById('messages-stats');

        async function loadMessages() {
            const snapshot = await getDocs(collection(db, "rsvps"));

            let submissions = [];

            snapshot.forEach((doc) => {
                submissions.push(doc.data());
            });

            // Calculate total attending guests
            let totalAttendingGuests = 0;

            submissions.forEach(s => {
                if (s.attend === 'yes') {
                    totalAttendingGuests += parseInt(s.guests || 0);
                }
            });

            stats.textContent = `Total Attending Guests: ${totalAttendingGuests}`;
            stats.style.display = 'block';

            // newest first
            submissions.reverse();

            const messages = submissions.filter(
                s => s.message && s.message.trim().length > 0
            );

            if (messages.length === 0) {
                container.innerHTML =
                `<div class="no-messages">No messages yet.</div>`;
            } else {
                container.innerHTML = "";
                messages.forEach((msg, index) => {
                    const card = document.createElement('div');
                    card.className = 'message-card';
                    card.style.animationDelay = `${index * 0.1}s`;

                    let authorExt = "";
                    if (msg.attend === 'yes' && msg.guests && parseInt(msg.guests) > 0) {
                        authorExt = ` (${msg.guests} ${parseInt(msg.guests) === 1 ? 'Guest' : 'Guests'})`;
                    }

                    card.innerHTML = `
                        <div class="message-text">${msg.message}</div>
                        <div class="message-author">- ${msg.name}${authorExt}</div>
                    `;

                    container.appendChild(card);
                });
            }
        }

        pwSubmit.addEventListener('click', () => {
            if (pwInput.value === '07102026') {
                pwArea.style.display = 'none';
                container.style.display = 'grid';
                container.innerHTML = "<div style='text-align:center; padding: 20px; color: var(--color-taupe); grid-column: 1 / -1;'>Loading messages...</div>";
                loadMessages();
            } else {
                pwFeedback.textContent = 'Incorrect password.';
            }
        });

        pwInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') pwSubmit.click();
        });
    </script>
</body>
</html>
